name: build-image

# 이미지를 GitHub 클라우드에서 빌드 → ghcr.io 로 push (로컬 docker/Docker Hub 불필요).
# 수동 실행: Actions 탭 → build-image → Run workflow.
# 자동: Dockerfile/install.sh 바뀌면 재빌드.
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'scripts/install.sh'
      - 'run.sh'
      - 'bench/benchmark.py'
      - 'configs/**'
      - '.github/workflows/docker-image.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 러너 디스크 확보 (torch+vllm 이미지 ~12GB 라 기본 여유로는 부족)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:latest
